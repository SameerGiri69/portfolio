# This is a simple GitHub Actions workflow to verify your project on every push
name: Portfolio CI

# This part tells GitHub when to run the workflow
on:
  push:
    branches: [ "main" ] # Runs whenever you push code to the 'main' branch

jobs:
  build-and-test:
    # This specifies the virtual machine the "runner" will use (Ubuntu Linux)
    runs-on: ubuntu-latest

    steps:
      # 1. Download the code from your repository onto the runner
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install Node.js so we can use npm commands
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Uses the same Node version as your Dockerfile

      # 3. Install necessary project dependencies (node_modules)
      - name: Install dependencies
        run: npm install
        working-directory: ./portfolio

      # 4. Run the Vite build to ensure there are no compilation errors
      - name: Build application
        run: npm run build
        working-directory: ./portfolio

      # 5. Build the Docker image to make sure the Dockerfile is still valid
      - name: Verify Docker build
        run: docker build -t portfolio-site ./portfolio
